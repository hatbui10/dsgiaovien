<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danh sách giáo viên</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Tắt viền xanh khi chạm trên điện thoại */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121216; /* Nền tối sâu */
            color: #e2e8f0;
            margin: 0;
            padding: 8px; /* Giảm padding viền ngoài */
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 12px; /* Thu nhỏ padding container */
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin: 4px 0 14px 0;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 📂 KHU VỰC THAO TÁC (TẢI FILE / XÓA) */
        .action-section {
            background: #262631;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px dashed #4a4a5a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-group-top {
            display: flex;
            gap: 6px;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            flex: 1;
        }
        .btn-action-top {
            width: 100%;
            border: 1px solid #3498db;
            color: #3498db;
            background-color: transparent;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            text-align: center;
        }
        .btn-action-top:active {
            background-color: #3498db;
            color: white;
        }
        .btn-danger {
            border-color: #e74c3c;
            color: #e74c3c;
            flex: 1;
        }
        .btn-danger:active {
            background-color: #e74c3c;
            color: white;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
        }
        .file-status {
            font-size: 0.75em;
            color: #94a3b8;
            text-align: center;
            line-height: 1.3;
        }

        /* 📱 THANH TIÊU ĐỀ ACCORDION BẤM ĐỂ ĐÓNG/MỞ */
        .accordion-header {
            background-color: #262631;
            color: #3498db;
            padding: 10px 12px;
            margin-top: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            border-left: 4px solid #3498db;
            transition: background-color 0.2s;
        }
        .header-chinh { color: #1abc9c; border-left-color: #1abc9c; }
        .header-phan-nhom { color: #9b59b6; border-left-color: #9b59b6; }
        .header-tro-giang { color: #e67e22; border-left-color: #e67e22; }
        
        .accordion-icon {
            transition: transform 0.2s ease;
            font-size: 0.8em;
        }
        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }
        .accordion-header:active {
            background-color: #2d2d3a;
        }

        /* KHỐI NỘI DUNG ẨN MẶC ĐỊNH */
        .accordion-content {
            display: none;
            margin-top: 6px;
            margin-bottom: 8px;
        }
        .accordion-content.open {
            display: block;
        }

        /* 📱 DANH SÁCH DẠNG THẺ TỐI ƯU KHÔNG GIAN DÒNG */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .user-card {
            background: #262631;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-left: 3px solid #555566;
        }
        .header-chinh + .accordion-content .user-card { border-left-color: #1abc9c; }
        .header-phan-nhom + .accordion-content .user-card { border-left-color: #9b59b6; }
        .header-tro-giang + .accordion-content .user-card { border-left-color: #e67e22; }

        /* TÊN GIÁO VIÊN */
        .card-top-info {
            margin-bottom: 8px;
            border-bottom: 1px solid #3f3f52;
            padding-bottom: 4px;
        }
        .user-name {
            font-size: 1em;
            font-weight: bold;
            color: #ffffff;
        }

        /* KHỐI LỚP HỌC */
        .class-section {
            margin-bottom: 6px;
        }
        .class-section-title {
            font-size: 0.8em;
            color: #1abc9c;
            font-weight: bold;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-phan-nhom + .accordion-content .class-section-title { color: #9b59b6; }
        .header-tro-giang + .accordion-content .class-section-title { color: #e67e22; }

        /* 🗓️ KHU VỰC HIỂN THỊ LỊCH HỌC TỐI ƯU KHÔNG XUỐNG DÒNG */
        .session-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .session-row {
            background: #1e1e24;
            padding: 5px 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78em;
        }
        .session-title {
            font-weight: bold;
            color: #94a3b8;
            min-width: 42px;
            white-space: nowrap;
        }
        .session-info {
            flex: 1;
            text-align: right;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 6px;
        }

        /* KHU VỰC NÚT LIÊN HỆ */
        .contact-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .btn-action {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: white;
            padding: 8px 0;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8em;
            text-align: center;
            transition: opacity 0.2s;
        }
        .btn-phone { background-color: #1ba3b5; }
        .btn-zalo { background-color: #0068ff; }
        .btn-action:active { opacity: 0.7; }
        .no-data {
            text-align: center;
            color: #64748b;
            padding: 14px 0;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản Lý Nhân Sự</h2>
    
    <div class="action-section">
        <div class="btn-group-top">
            <div class="upload-btn-wrapper">
                <button class="btn-action-top">📂 Tải file Excel</button>
                <input type="file" id="excelFileInput" accept=".xlsx, .xls" multiple onchange="handleExcelFiles(this.files)">
            </div>
            <button class="btn-action-top btn-danger" onclick="clearStoredData()">🗑️ Xóa cũ</button>
        </div>
        <div id="fileStatus" class="file-status">Đang sử dụng bộ nhớ tự động của trình duyệt.</div>
    </div>
    
    <!-- 1. GIÁO VIÊN CHÍNH -->
    <div class="accordion-header header-chinh" onclick="toggleAccordion('gv-chinh-content', this)">
        <span>⭐ GIÁO VIÊN CHÍNH</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="gv-chinh-content" class="accordion-content">
        <div id="gv-chinh-cards" class="card-list"></div>
    </div>

    <!-- 2. PHÂN NHÓM -->
    <div class="accordion-header header-phan-nhom" onclick="toggleAccordion('gv-phan-nhom-content', this)">
        <span>👥 GIÁO VIÊN PHÂN NHÓM</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="gv-phan-nhom-content" class="accordion-content">
        <div id="gv-phan-nhom-cards" class="card-list"></div>
    </div>

    <!-- 3. TRỢ GIẢNG -->
    <div class="accordion-header header-tro-giang" onclick="toggleAccordion('tro-giang-content', this)">
        <span>🧑‍🎓 DANH SÁCH TRỢ GIẢNG</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="tro-giang-content" class="accordion-content">
        <div id="tro-giang-cards" class="card-list"></div>
    </div>
</div>

<script>
    let gvChinhData = [];
    let gvPhanNhomData = [];
    let troGiangData = [];

    function getRawPhone(phoneStr) {
        if (!phoneStr) return "";
        let cleanPhone = phoneStr.toString().trim().replace(/[^0-9]/g, "");
        if (cleanPhone.length > 0 && !cleanPhone.startsWith("0")) {
            cleanPhone = "0" + cleanPhone;
        }
        return cleanPhone;
    }

    function formatPhoneDisplay(phoneStr) {
        let clean = getRawPhone(phoneStr);
        if (!clean) return "";
        return clean.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3");
    }

    function renderCardList(dataArray, targetContainerId) {
        const container = document.getElementById(targetContainerId);
        container.innerHTML = ""; 

        if(!dataArray || dataArray.length === 0) {
            container.innerHTML = `<div class="no-data">Chưa có dữ liệu ở nhóm này.</div>`;
            return;
        }

        dataArray.forEach(item => {
            const rawPhone = getRawPhone(item.sdt);
            const displayPhone = formatPhoneDisplay(item.sdt);
            
            const card = document.createElement("div");
            card.className = "user-card";
            card.innerHTML = `
                <div class="card-top-info">
                    <div class="user-name">${item.hoTen}</div>
                </div>
                
                <div class="class-section">
                    <div class="class-section-title">${item.lopA.tenLop}</div>
                    <div class="session-container">
                        <div class="session-row">
                            <span class="session-title">B1:</span>
                            <div class="session-info">${item.lopA.b1}</div>
                        </div>
                        <div class="session-row">
                            <span class="session-title">B2:</span>
                            <div class="session-info">${item.lopA.b2}</div>
                        </div>
                    </div>
                </div>

                <div class="class-section">
                    <div class="class-section-title">${item.lopB.tenLop}</div>
                    <div class="session-container">
                        <div class="session-row">
                            <span class="session-title">B3:</span>
                            <div class="session-info">${item.lopB.b3}</div>
                        </div>
                        <div class="session-row">
                            <span class="session-title">B4:</span>
                            <div class="session-info">${item.lopB.b4}</div>
                        </div>
                    </div>
                </div>

                <div class="contact-actions">
                    <a href="tel:${rawPhone}" class="btn-action btn-phone">📞 Gọi: ${displayPhone}</a>
                    <a href="https://zalo.me/${rawPhone}" target="_blank" class="btn-action btn-zalo">💬 Zalo</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function handleExcelFiles(files) {
        if (files.length === 0) return;
        
        let fileNames = [];
        let tempChinh = [];
        let tempPhanNhom = [];
        let tempTroGiang = [];
        let filesProcessed = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            fileNames.push(file.name);
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                workbook.SheetNames.forEach(sheetName => {
                    const worksheet = workbook.Sheets[sheetName];
                    const matrixData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    if (matrixData && matrixData.length > 0) {
                        const targetGroup = targetClassification(file.name, sheetName);
                        
                        // Đưa mảng tạm hiện tại vào để check trùng lặp chéo dòng
                        if (targetGroup === "nhom") {
                            tempPhanNhom = parseMatrixAndMerge(matrixData, tempPhanNhom);
                        } else if (targetGroup === "giang") {
                            tempTroGiang = parseMatrixAndMerge(matrixData, tempTroGiang);
                        } else {
                            tempChinh = parseMatrixAndMerge(matrixData, tempChinh);
                        }
                    }
                });

                filesProcessed++;
                
                if (filesProcessed === files.length) {
                    gvChinhData = tempChinh;
                    gvPhanNhomData = tempPhanNhom;
                    troGiangData = tempTroGiang;

                    localStorage.setItem("gvChinhData", JSON.stringify(gvChinhData));
                    localStorage.setItem("gvPhanNhomData", JSON.stringify(gvPhanNhomData));
                    localStorage.setItem("troGiangData", JSON.stringify(troGiangData));
                    
                    renderAllLists();
                }
            };
            reader.readAsArrayBuffer(file);
        }
        document.getElementById("fileStatus").innerText = "Đã nạp: " + fileNames.join(", ");
    }

    function targetClassification(fileName, sheetName) {
        const textToCheck = (sheetName + "_" + fileName).toLowerCase();
        if (textToCheck.includes("nhom") || textToCheck.includes("nhóm")) return "nhom";
        if (textToCheck.includes("giang") || textToCheck.includes("giảng") || textToCheck.includes("tro") || textToCheck.includes("trợ")) return "giang";
        return "chinh";
    }

    // 🛠️ LOGIC MỚI: KIỂM TRA TRÙNG VÀ GỘP LỊCH TỰ ĐỘNG KHI XUẤT HIỆN NHIỀU DÒNG
    function parseMatrixAndMerge(matrix, currentGroupArray) {
        let headerIndex = -1;

        for (let i = 0; i < matrix.length; i++) {
            if (!matrix[i]) continue;
            const row = matrix[i].map(cell => cell ? cell.toString().trim().toLowerCase() : "");
            if (row.some(cell => cell.includes("họ và tên") || cell.includes("ho va ten") || cell.includes("họ tên"))) {
                headerIndex = i;
                break;
            }
        }

        let startRow = headerIndex !== -1 ? headerIndex + 1 : 1;

        for (let i = startRow; i < matrix.length; i++) {
            const row = matrix[i];
            if (!row || row.length === 0 || !row[0]) continue; 
            
            const hoTen = row[0] ? row[0].toString().trim() : "";
            const sdt = row[1] ? row[1].toString().trim() : "";
            const rawPhone = getRawPhone(sdt);

            // Tạo mã nhận diện duy nhất (ưu tiên dùng Số điện thoại sạch, nếu ko có thì dùng Tên)
            const uniqueKey = rawPhone ? rawPhone : hoTen.toLowerCase().replace(/\s+/g, '');

            // Tìm xem giáo viên này đã được nạp ở hàng trước (hoặc sheet trước) chưa
            let existingTeacher = currentGroupArray.find(item => {
                const itemPhone = getRawPhone(item.sdt);
                const itemKey = itemPhone ? itemPhone : item.hoTen.toLowerCase().replace(/\s+/g, '');
                return itemKey === uniqueKey;
            });

            if (existingTeacher) {
                // NẾU ĐÃ CÓ: Chuyển dữ liệu của hàng mới này vào ô Lớp B (Buổi 3, Buổi 4)
                existingTeacher.lopB = {
                    tenLop: row[2] ? "📖 " + row[2].toString().trim() : "📖 Lớp dạy 2",
                    b3: row[3] ? row[3].toString().trim() : "Trống",
                    b4: row[4] ? row[4].toString().trim() : "Trống"
                };
            } else {
                // NẾU CHƯA CÓ: Tạo mới dữ liệu và mặc định gán vào Lớp A (Buổi 1, Buổi 2)
                currentGroupArray.push({
                    hoTen: hoTen,
                    sdt: sdt,
                    lopA: {
                        tenLop: row[2] ? "📖 " + row[2].toString().trim() : "📖 Lớp dạy 1",
                        b1: row[3] ? row[3].toString().trim() : "Trống",
                        b2: row[4] ? row[4].toString().trim() : "Trống"
                    },
                    lopB: {
                        tenLop: "📖 Không có lớp 2",
                        b3: "Trống",
                        b4: "Trống"
                    }
                });
            }
        }
        return currentGroupArray;
    }

    function clearStoredData() {
        if(confirm("Bạn có chắc chắn muốn xóa toàn bộ danh sách cũ không?")) {
            localStorage.removeItem("gvChinhData");
            localStorage.removeItem("gvPhanNhomData");
            localStorage.removeItem("troGiangData");
            gvChinhData = []; gvPhanNhomData = []; troGiangData = [];
            renderAllLists();
            document.getElementById("excelFileInput").value = "";
            document.getElementById("fileStatus").innerText = "Dữ liệu đã được xóa sạch. Hãy tải file mới.";
        }
    }

    function renderAllLists() {
        renderCardList(gvChinhData, "gv-chinh-cards");
        renderCardList(gvPhanNhomData, "gv-phan-nhom-cards");
        renderCardList(troGiangData, "tro-giang-cards");
    }

    function loadSavedData() {
        const storedChinh = localStorage.getItem("gvChinhData");
        const storedNhom = localStorage.getItem("gvPhanNhomData");
        const storedGiang = localStorage.getItem("troGiangData");

        if (storedChinh) gvChinhData = JSON.parse(storedChinh);
        if (storedNhom) gvPhanNhomData = JSON.parse(storedNhom);
        if (storedGiang) troGiangData = JSON.parse(storedGiang);

        renderAllLists();
    }

    function toggleAccordion(contentId, headerElement) {
        const content = document.getElementById(contentId);
        const isOpen = content.classList.contains('open');
        if (isOpen) {
            content.classList.remove('open');
            headerElement.classList.remove('active');
        } else {
            content.classList.add('open');
            headerElement.classList.add('active');
        }
    }

    window.onload = function() {
        loadSavedData();
    };
</script>

</body>
    </html>
