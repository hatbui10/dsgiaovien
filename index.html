<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Danh sách giáo viên</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    margin:20px;
}

input[type=file]{
    margin-bottom:15px;
}

details{
    background:white;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    overflow:hidden;
}

summary{
    padding:15px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    background:#1976d2;
    color:white;
    user-select:none;
}

#teacherList{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
    gap:16px;
}

.teacher-card{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:#1e293b;
    border:1px solid #334155;
    border-left:5px solid #3b82f6;

    border-radius:16px;
    padding:18px;

    transition:.25s;
}

.teacher-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 30px rgba(0,0,0,.45);
}

.teacher-name{
    font-size:17px;
    font-weight:bold;
}

.teacher-phone{
    color:#00c853;
    margin-top:4px;
}

.call-btn{

    background:linear-gradient(135deg,#00c853,#00e676);

    color:white;

    border:none;

    padding:12px 18px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    transition:.2s;

}

.call-btn:hover{

    transform:scale(1.08);

}

.avatar{

    width:55px;

    height:55px;

    border-radius:50%;

    background:#2196f3;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:24px;

    font-weight:bold;

}

details{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:14px;
    overflow:hidden;
}

summary{
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    color:white;
    padding:16px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}
</style>

</head>
<body>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<details open>

<summary>
📚 Danh sách giáo viên
</summary>

<div id="teacherList"></div>

</details>

<script>

document.getElementById("excelFile").addEventListener("change", loadExcel);

function loadExcel(e){

    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(evt){

        const data=new Uint8Array(evt.target.result);

        const workbook=XLSX.read(data,{type:"array"});

        const sheet=workbook.Sheets[workbook.SheetNames[0]];

        const rows=XLSX.utils.sheet_to_json(sheet,{
            header:1,
            defval:""
        });

        renderTeachers(rows);

    };

    reader.readAsArrayBuffer(file);

}


function formatPhone(phone){

    phone = String(phone);

    if(phone.length==10){
        return phone.replace(/(\d{3})(\d{3})(\d{4})/,"$1.$2.$3");
    }

    if(phone.length==11){
        return phone.replace(/(\d{4})(\d{3})(\d{4})/,"$1.$2.$3");
    }

    return phone;
}


function renderTeachers(rows){

    const container=document.getElementById("teacherList");

    container.innerHTML="";

    // Bỏ dòng tiêu đề
    rows.slice(1).forEach(row=>{

        const name=row[1];
        let phone=row[3];

        if(!name) return;

        phone=String(phone).replace(/\.0$/,'');
// Nếu Excel làm mất số 0 đầu
if(phone.length==9){
    phone="0"+phone;
}
        const phoneDisplay = formatPhone(phone);
        const card=document.createElement("div");

        card.className="teacher-card";

        card.innerHTML=`

            <div style="display:flex;align-items:center;gap:15px;">

    <div class="avatar">
        ${name.trim()[0].toUpperCase()}
    </div>

    <div>

        <div class="teacher-name">${name}</div>

        <div class="teacher-phone">
            📞 ${phoneDisplay}
        </div>

    </div>

</div>

            <button
                class="call-btn"
                onclick="window.location.href='tel:${phone}'">
                Gọi
            </button>

        `;

        container.appendChild(card);

    });

}

</script>

</body>
</html>
