<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Nhân Sự Giảng Dạy</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Tắt khung viền xanh mặc định khi chạm trên điện thoại */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121216; /* Nền tối sâu */
            color: #e2e8f0;
            margin: 0;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 500px; /* Độ rộng tối ưu cho màn hình điện thoại */
            margin: 0 auto;
            background: #1e1e24; /* Nền container sáng hơn một chút để tạo khối chiều sâu */
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin-top: 8px;
            margin-bottom: 20px;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* 📱 THANH ĐIỀU HƯỚNG TAB LỚN (GIÁO VIÊN / TRỢ GIẢNG) */
        .tab-navigation {
            display: flex;
            background: #262631;
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 6px;
            font-size: 0.85em;
            font-weight: bold;
            color: #94a3b8;
            background: transparent;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .tab-btn.active[data-tab="giao-vien"] {
            background-color: #3498db;
            color: #ffffff;
        }
        .tab-btn.active[data-tab="tro-giang"] {
            background-color: #e67e22;
            color: #ffffff;
        }

        /* 👥 THANH ĐIỀU HƯỚNG TAB CON BÊN TRONG TAB GIÁO VIÊN */
        .sub-tab-navigation {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .sub-tab-btn {
            flex: 1;
            padding: 8px 4px;
            font-size: 0.8em;
            font-weight: bold;
            color: #94a3b8;
            background: #262631;
            border: 1px solid #3f3f52;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        /* Style khi các tab con được chọn */
        .sub-tab-btn.active[data-subtab="gv-chinh"] {
            background-color: #1abc9c;
            border-color: #1abc9c;
            color: #ffffff;
        }
        .sub-tab-btn.active[data-subtab="gv-phan-nhom"] {
            background-color: #9b59b6;
            border-color: #9b59b6;
            color: #ffffff;
        }

        /* ẨN / HIỆN LOGIC KHỐI */
        .tab-content, .sub-tab-content {
            display: none;
        }
        .tab-content.active, .sub-tab-content.active {
            display: block;
        }

        /* 📱 THIẾT KẾ THẺ DANH SÁCH (MOBILE CARDS) */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .user-card {
            background: #262631;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-left: 4px solid #3498db;
        }
        /* Đổi màu thanh chỉ thị bên cạnh thẻ dựa theo từng nhóm */
        .sub-tab-content[id="gv-chinh"] .user-card {
            border-left-color: #1abc9c;
        }
        .sub-tab-content[id="gv-phan-nhom"] .user-card {
            border-left-color: #9b59b6;
        }
        .tab-content[id="tro-giang"] .user-card {
            border-left-color: #e67e22;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .user-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffffff;
        }
        .badge-lop {
            background-color: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .tab-content[id="tro-giang"] .badge-lop {
            background-color: #e67e22;
        }
        .user-time {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 14px;
            line-height: 1.4;
        }
        
        /* KHU VỰC NÚT ĐIỀU HƯỚNG */
        .contact-actions {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: white;
            padding: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85em;
            text-align: center;
            transition: opacity 0.2s;
        }
        .btn-phone {
            background-color: #1ba3b5;
        }
        .btn-zalo {
            background-color: #0068ff;
        }
        .btn-action:active {
            opacity: 0.7; /* Tạo hiệu ứng phản hồi nhấn nút mượt mà khi chạm trên màn hình cảm ứng */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản Lý Nhân Sự</h2>
    
    <!-- Tab Điều Hướng Lớn -->
    <div class="tab-navigation">
        <button class="tab-btn active" data-tab="giao-vien">👨‍🏫 GIÁO VIÊN</button>
        <button class="tab-btn" data-tab="tro-giang">🧑‍🎓 TRỢ GIẢNG</button>
    </div>

    <!-- KHU VỰC TAB GIÁO VIÊN -->
    <div id="giao-vien" class="tab-content active">
        <!-- 2 Tab Con Phân Loại Giáo Viên -->
        <div class="sub-tab-navigation">
            <button class="sub-tab-btn active" data-subtab="gv-chinh">⭐ GIÁO VIÊN CHÍNH</button>
            <button class="sub-tab-btn" data-subtab="gv-phan-nhom">👥 PHÂN NHÓM</button>
        </div>

        <!-- Nội dung Giáo Viên Chính -->
        <div id="gv-chinh" class="sub-tab-content active">
            <div id="gv-chinh-cards" class="card-list"></div>
        </div>

        <!-- Nội dung Giáo Viên Phân Nhóm -->
        <div id="gv-phan-nhom" class="sub-tab-content">
            <div id="gv-phan-nhom-cards" class="card-list"></div>
        </div>
    </div>

    <!-- KHU VỰC TAB TRỢ GIẢNG -->
    <div id="tro-giang" class="tab-content">
        <div id="tro-giang-cards" class="card-list"></div>
    </div>
</div>

<script>
    // 1. DỮ LIỆU GIÁO VIÊN CHÍNH
    const danhSachGvChinh = [
        { hoTen: "Anh Thư", sdt: "0901234567", lop: "Lớp 10A1", thoiGian: "Thứ 2, Thứ 4 (08:00 - 10:00)" },
        { hoTen: "Phương Thanh", sdt: "0912345678", lop: "Lớp 11B2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Quỳnh Anh", sdt: "0912345678", lop: "Lớp 11B2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Thanh Mai", sdt: "0912345678", lop: "Lớp 11B2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Hưng", sdt: "0983456789", lop: "Lớp 12C3", thoiGian: "Thứ 7 (09:00 - 11:30)" }
    ];

    // 2. DỮ LIỆU GIÁO VIÊN PHÂN NHÓM
    const danhSachGvPhanNhom = [
        { hoTen: "Hà Linh", sdt: "0912345678", lop: "Phân Nhóm 1", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Diệp Anh", sdt: "0912345678", lop: "Phân Nhóm 2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Mạnh Toàn", sdt: "0912345678", lop: "Phân Nhóm 1", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Thu Minh", sdt: "0912345678", lop: "Phân Nhóm 3", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Hà My", sdt: "0912345678", lop: "Phân Nhóm 2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Duyên", sdt: "0912345678", lop: "Phân Nhóm 1", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Bảo Anh", sdt: "0912345678", lop: "Phân Nhóm 3", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" }
    ];

    // 3. DỮ LIỆU TRỢ GIẢNG
    const danhSachTroGiang = [
        { hoTen: "Phạm Minh D", sdt: "0977888999", lop: "Lớp 10A1 & 11B2", thoiGian: "Thứ 2, 3, 4, 5 (Theo ca học)" },
        { hoTen: "Hoàng Thu Thảo", sdt: "0965123456", lop: "Lớp 12C3", thoiGian: "Thứ 7 (08:30 - 12:00)" },
        { hoTen: "Đặng Đình Khôi", sdt: "0934555666", lop: "Lớp Luyện Thi", thoiGian: "Chủ Nhật (17:30 - 20:30)" }
    ];

    function getRawPhone(phoneStr) {
        return phoneStr.replace(/[^0-9]/g, "");
    }

    function formatPhoneDisplay(phoneStr) {
        if (!phoneStr) return "";
        return phoneStr.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3");
    }

    // Đổ dữ liệu ra Card List
    function renderCardList(dataArray, targetContainerId) {
        const container = document.getElementById(targetContainerId);
        container.innerHTML = ""; 

        dataArray.forEach(item => {
            const rawPhone = getRawPhone(item.sdt);
            const displayPhone = formatPhoneDisplay(item.sdt);
            
            const card = document.createElement("div");
            card.className = "user-card";
            card.innerHTML = `
                <div class="card-header">
                    <div class="user-name">${item.hoTen}</div>
                    <div class="badge-lop">${item.lop}</div>
                </div>
                <div class="user-time">🕒 Lịch: ${item.thoiGian}</div>
                <div class="contact-actions">
                    <a href="tel:${rawPhone}" class="btn-action btn-phone">📞 Gọi: ${displayPhone}</a>
                    <a href="https://zalo.me/${rawPhone}" target="_blank" class="btn-action btn-zalo">💬 Zalo</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Xử lý chuyển đổi Tab Lớn (Giáo Viên / Trợ Giảng)
    function setupTabSwitching() {
        const buttons = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.tab-content');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                const targetTabId = btn.getAttribute('data-tab');
                document.getElementById(targetTabId).classList.add('active');
            });
        });
    }

    // Xử lý chuyển đổi Tab Con bên trong Giáo Viên (Chính / Phân Nhóm)
    function setupSubTabSwitching() {
        const subButtons = document.querySelectorAll('.sub-tab-btn');
        const subContents = document.querySelectorAll('.sub-tab-content');

        subButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                subButtons.forEach(b => b.classList.remove('active'));
                subContents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                const targetSubTabId = btn.getAttribute('data-subtab');
                document.getElementById(targetSubTabId).classList.add('active');
            });
        });
    }

    window.onload = function() {
        renderCardList(danhSachGvChinh, "gv-chinh-cards");
        renderCardList(danhSachGvPhanNhom, "gv-phan-nhom-cards");
        renderCardList(danhSachTroGiang, "tro-giang-cards");
        setupTabSwitching();
        setupSubTabSwitching();
    };
</script>

</body>
</html>
