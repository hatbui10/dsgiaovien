<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh bạ Nhân sự</title>
    <style>
        :root { 
            --bg-main: #0f172a; --bg-card: #1e293b; --border-color: #334155; 
            --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #3b82f6; --success: #10b981; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #fff; margin-bottom: 30px; }
        details { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
        summary { padding: 18px; font-weight: 700; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .list-grid { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .card { display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-color); border-left: 4px solid var(--primary); border-radius: 10px; padding: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 700; background: var(--primary); flex-shrink: 0; }
        .info { overflow: hidden; margin-left: 12px; }
        .name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .phone { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .call-btn { background: var(--success); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h1>📱 DANH BẠ NHÂN SỰ</h1>
</div>

<script>
    // 1. ĐỊNH NGHĨA CÁC MỤC Ở ĐÂY
    const categories = [
        { title: "Giáo viên", role: "GV" },
        { title: "Trợ giảng", role: "TG" },
        { title: "Nhân viên quét dọn", role: "NVQD" },
        { title: "Bác sĩ", role: "BS" }
    ];

    // 2. NHẬP DỮ LIỆU TẠI ĐÂY (Chỉ cần thêm đúng role là sẽ tự vào mục)
    const staffData = [
        // Giáo viên
        { name: 'Mai Khánh Ly', phone: '0375874325', role: 'GV' },
        { name: 'Nguyễn Hà An', phone: '0975710497', role: 'GV' },
        { name: 'Phạm Thị Thanh Tân', phone: '0389919237', role: 'GV' },
        { name: 'Nguyễn Thị Phương', phone: '0363565410', role: 'GV' },
        { name: 'Lê Hồng Nhung', phone: '0367701993', role: 'GV' },
        { name: 'Đỗ Trà My', phone: '0328468602', role: 'GV' },
        { name: 'Nguyễn Thanh Thảo', phone: '0388357632', role: 'GV' },
        { name: 'Nguyễn Thu Hà B', phone: '0359788582', role: 'GV' },
        { name: 'Nguyễn Thu Phương', phone: '0964382095', role: 'GV' },
        { name: 'Ngô Thị Thu Hằng', phone: '0968125259', role: 'GV' },
        { name: 'Lê Minh Phương', phone: '0332323361', role: 'GV' },
        { name: 'Nguyễn Như Mai', phone: '0395729123', role: 'GV' },
        { name: 'Hoàng Yến', phone: '0888281294', role: 'GV' },

        // Trợ giảng (Ví dụ)
        { name: 'Nguyễn Văn A', phone: '0912345678', role: 'TG' },
        
        // Nhân viên quét dọn (Ví dụ)
        { name: 'Bà Nguyễn Thị M', phone: '0987654321', role: 'NVQD' },
        
        // Bác sĩ (Ví dụ)
        { name: 'Bác sĩ Trần Văn Z', phone: '0909090909', role: 'BS' }
    ];

    function render() {
        const container = document.getElementById("mainContainer");
        categories.forEach(cat => {
            const members = staffData.filter(s => s.role === cat.role);
            
            // Chỉ tạo mục nếu có người (hoặc luôn tạo thì bỏ điều kiện if)
            const section = document.createElement("details");
            section.open = true;
            section.innerHTML = `
                <summary>${cat.title} 
                    <span style="background: #334155; padding: 2px 8px; border-radius: 12px; font-size: 12px;">${members.length}</span>
                </summary>
                <div class="list-grid">
                    ${members.length > 0 ? members.map(m => `
                        <div class="card">
                            <div style="display:flex; align-items:center; overflow:hidden;">
                                <div class="avatar">${m.name.charAt(0)}</div>
                                <div class="info">
                                    <div class="name">${m.name}</div>
                                    <div class="phone">📞 ${m.phone}</div>
                                </div>
                            </div>
                            <button class="call-btn" onclick="window.location.href='tel:${m.phone}'">Gọi</button>
                        </div>
                    `).join('') : '<div style="padding:10px; color:var(--text-muted);">Chưa có dữ liệu</div>'}
                </div>
            `;
            container.appendChild(section);
        });
    }

    window.onload = render;
</script>

</body>
</html>
