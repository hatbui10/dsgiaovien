<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Nhân Sự Giảng Dạy</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Tắt viền xanh khi chạm trên điện thoại */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121216;
            color: #e2e8f0;
            margin: 0;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 500px; /* Tối ưu kích thước màn hình điện thoại */
            margin: 0 auto;
            background: #1e1e24;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin: 8px 0 16px 0;
            font-size: 1.25em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* KHU VỰC THAO TÁC (TẢI FILE / XÓA) */
        .action-section {
            background: #262631;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px dashed #4a4a5a;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-group-top {
            display: flex;
            gap: 8px;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            flex: 1;
        }
        .btn-action {
            width: 100%;
            border: 2px solid #3498db;
            color: #3498db;
            background-color: transparent;
            padding: 10px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
            text-align: center;
        }
        .btn-action:active {
            background-color: #3498db;
            color: white;
        }
        .btn-danger {
            border-color: #e74c3c;
            color: #e74c3c;
            flex: 1;
        }
        .btn-danger:active {
            background-color: #e74c3c;
            color: white;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
        }
        .file-status {
            font-size: 0.8em;
            color: #94a3b8;
            text-align: center;
            line-height: 1.4;
        }

        /* TAB NAVIGATION (PHONG CÁCH MOBILE APP) */
        .tab-navigation {
            display: flex;
            background: #262631;
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 0.85em;
            font-weight: bold;
            color: #94a3b8;
            background: transparent;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .tab-btn.active[data-tab="giao-vien"] {
            background-color: #3498db;
            color: white;
        }
        .tab-btn.active[data-tab="tro-giang"] {
            background-color: #e67e22;
            color: white;
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* STYLE FOR ACCORDION (THANH BẤM DI ĐỘNG) */
        .accordion-header {
            background-color: #262631;
            color: #3498db;
            padding: 14px 16px;
            margin-top: 10px;
            margin-bottom: 6px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            border-left: 4px solid #3498db;
        }
        .accordion-header.header-phan-nhom {
            color: #1abc9c;
            border-left-color: #1abc9c;
        }
        .accordion-icon {
            transition: transform 0.2s ease;
            font-size: 0.8em;
        }
        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }
        .accordion-content {
            display: none;
            margin-bottom: 10px;
        }
        .accordion-content.open {
            display: block;
        }
        
        /* 📱 DANH SÁCH DẠNG THẺ (MOBILE CARDS) */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }
        .user-card {
            background: #262631;
            border-radius: 12px;
            padding: 14px;
            border-left: 3px solid #555566;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .user-info-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .user-name {
            font-size: 1.05em;
            font-weight: bold;
            color: #ffffff;
        }
        .badge-lop {
            background-color: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .table-trogiang .badge-lop {
            background-color: #8e44ad;
        }
        .user-time {
            font-size: 0.82em;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* KHU VỰC NÚT LIÊN HỆ LỚN DỄ CHẠM */
        .contact-actions {
            display: flex;
            gap: 8px;
        }
        .btn-phone, .btn-zalo {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: white;
            padding: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85em;
            text-align: center;
        }
        .btn-phone {
            background-color: #1ba3b5;
        }
        .btn-zalo {
            background-color: #0068ff;
        }
        .btn-phone:strong, .btn-zalo:strong {
            opacity: 0.8;
        }
        .no-data {
            text-align: center;
            color: #64748b;
            padding: 20px 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản Lý Nhân Sự</h2>
    
    <div class="action-section">
        <div class="btn-group-top">
            <div class="upload-btn-wrapper">
                <button class="btn-action">📂 Tải file Excel</button>
                <input type="file" id="excelFileInput" accept=".xlsx, .xls" multiple onchange="handleExcelFiles(this.files)">
            </div>
            <button class="btn-action btn-danger" onclick="clearStoredData()">🗑️ Xóa cũ</button>
        </div>
        <div id="fileStatus" class="file-status">Chưa chọn file mới. Đang sử dụng bộ nhớ tự động của trình duyệt.</div>
    </div>
    
    <div class="tab-navigation">
        <button class="tab-btn active" data-tab="giao-vien">👨‍🏫 GIÁO VIÊN</button>
        <button class="tab-btn" data-tab="tro-giang">🧑‍🎓 TRỢ GIẢNG</button>
    </div>

    <div id="giao-vien" class="tab-content active">
        <div class="accordion-header" onclick="toggleAccordion('chinh-content', this)">
            <span>⭐ GIÁO VIÊN CHÍNH</span>
            <span class="accordion-icon">▼</span>
        </div>
        <div id="chinh-content" class="accordion-content">
            <div id="giao-vien-chinh-list" class="card-list"></div>
        </div>

        <div class="accordion-header header-phan-nhom" onclick="toggleAccordion('phannhom-content', this)">
            <span>👥 GIÁO VIÊN PHÂN NHÓM</span>
            <span class="accordion-icon">▼</span>
        </div>
        <div id="phannhom-content" class="accordion-content">
            <div id="giao-vien-phannhom-list" class="card-list"></div>
        </div>
    </div>

    <div id="tro-giang" class="tab-content table-trogiang">
        <div id="tro-giang-list" class="card-list"></div>
    </div>
</div>

<script>
    let gvChinhData = [];
    let gvPhanNhomData = [];
    let troGiangData = [];

    // Lấy chuỗi số điện thoại chỉ gồm chữ số để làm link
    function getCleanPhone(phoneStr) {
        if (!phoneStr) return "";
        let cleanPhone = phoneStr.toString().trim().replace(/[^0-9]/g, "");
        if (cleanPhone.length > 0 && !cleanPhone.startsWith("0")) {
            cleanPhone = "0" + cleanPhone;
        }
        return cleanPhone;
    }

    // Tạo định dạng hiển thị xxxx.xxx.xxx
    function formatPhoneDisplay(phoneStr) {
        let clean = getCleanPhone(phoneStr);
        if (!clean) return "";
        return clean.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3");
    }

    // Đổ dữ liệu dạng THẺ (CARD) cho di động
    function renderCardList(dataArray, targetListId) {
        const listContainer = document.getElementById(targetListId);
        listContainer.innerHTML = ""; 

        if(!dataArray || dataArray.length === 0) {
            listContainer.innerHTML = `<div class="no-data">Chưa có dữ liệu, hãy tải file lên.</div>`;
            return;
        }

        dataArray.forEach(item => {
            const rawPhone = getCleanPhone(item.sdt);
            const displayPhone = formatPhoneDisplay(item.sdt);
            
            const card = document.createElement("div");
            card.className = "user-card";
            card.innerHTML = `
                <div class="user-info-main">
                    <div class="user-name">${item.hoTen}</div>
                    <div class="badge-lop">${item.lop}</div>
                </div>
                <div class="user-time">🕒 Lịch: ${item.thoiGian}</div>
                <div class="contact-actions">
                    <a href="tel:${rawPhone}" class="btn-phone">📞 Gọi: ${displayPhone}</a>
                    <a href="https://zalo.me/${rawPhone}" target="_blank" class="btn-zalo">💬 Zalo</a>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    // Đọc Excel trực tiếp bằng SheetJS
    function handleExcelFiles(files) {
        if (files.length === 0) return;
        
        let fileNames = [];
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            fileNames.push(file.name);
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const matrixData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                processExcelMatrix(matrixData, file.name);
            };
            reader.readAsArrayBuffer(file);
        }
        document.getElementById("fileStatus").innerText = "Đã nạp file: " + fileNames.join(", ");
    }

    function processExcelMatrix(matrix, fileName) {
        let parsedData = [];
        let headerIndex = -1;

        for (let i = 0; i < matrix.length; i++) {
            const row = matrix[i].map(cell => cell ? cell.toString().trim() : "");
            if (row.includes("Họ và Tên") || row.includes("Họ và tên")) {
                headerIndex = i;
                break;
            }
        }

        let startRow = headerIndex !== -1 ? headerIndex + 1 : 1;

        for (let i = startRow; i < matrix.length; i++) {
            const row = matrix[i];
            if (!row || row.length === 0 || !row[0]) continue; 
            
            parsedData.push({
                hoTen: row[0] ? row[0].toString().trim() : "",
                sdt: row[1] ? row[1].toString().trim() : "",
                lop: row[2] ? row[2].toString().trim() : "",
                thoiGian: row[3] ? row[3].toString().trim() : "Chưa có lịch"
            });
        }

        const nameLower = fileName.toLowerCase();
        if (nameLower.includes("chinh")) {
            gvChinhData = parsedData;
            localStorage.setItem("gvChinhData", JSON.stringify(gvChinhData));
            renderCardList(gvChinhData, "giao-vien-chinh-list");
        } else if (nameLower.includes("nhom")) {
            gvPhanNhomData = parsedData;
            localStorage.setItem("gvPhanNhomData", JSON.stringify(gvPhanNhomData));
            renderCardList(gvPhanNhomData, "giao-vien-phannhom-list");
        } else if (nameLower.includes("giang") || nameLower.includes("tro")) {
            troGiangData = parsedData;
            localStorage.setItem("troGiangData", JSON.stringify(troGiangData));
            renderCardList(troGiangData, "tro-giang-list");
        } else {
            gvChinhData = parsedData;
            localStorage.setItem("gvChinhData", JSON.stringify(gvChinhData));
            renderCardList(gvChinhData, "giao-vien-chinh-list");
        }
    }

    // Xóa LocalStorage
    function clearStoredData() {
        if(confirm("Bạn có chắc chắn muốn xóa toàn bộ danh sách cũ không?")) {
            localStorage.removeItem("gvChinhData");
            localStorage.removeItem("gvPhanNhomData");
            localStorage.removeItem("troGiangData");
            
            gvChinhData = [];
            gvPhanNhomData = [];
            troGiangData = [];
            
            renderAllLists();
            document.getElementById("excelFileInput").value = "";
            document.getElementById("fileStatus").innerText = "Dữ liệu đã được xóa sạch. Hãy tải file mới.";
        }
    }

    function renderAllLists() {
        renderCardList(gvChinhData, "giao-vien-chinh-list");
        renderCardList(gvPhanNhomData, "giao-vien-phannhom-list");
        renderCardList(troGiangData, "tro-giang-list");
    }

    function loadSavedData() {
        const storedChinh = localStorage.getItem("gvChinhData");
        const storedNhom = localStorage.getItem("gvPhanNhomData");
        const storedGiang = localStorage.getItem("troGiangData");

        if (storedChinh) gvChinhData = JSON.parse(storedChinh);
        if (storedNhom) gvPhanNhomData = JSON.parse(storedNhom);
        if (storedGiang) troGiangData = JSON.parse(storedGiang);

        renderAllLists();
    }

    // Accordion ẩn/hiện
    function toggleAccordion(contentId, headerElement) {
        const content = document.getElementById(contentId);
        content.classList.toggle('open');
        headerElement.classList.toggle('active');
    }

    // Chuyển Tab danh sách
    function setupTabSwitching() {
        const buttons = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.tab-content');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                const targetTabId = btn.getAttribute('data-tab');
                document.getElementById(targetTabId).classList.add('active');
            });
        });
    }

    window.onload = function() {
        loadSavedData();
        setupTabSwitching();
    };
</script>

</body>
</html>
