<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Nhân Sự Giảng Dạy</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Tắt khung viền xanh mặc định khi chạm trên điện thoại */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121216; /* Nền tối sâu */
            color: #e2e8f0;
            margin: 0;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 500px; /* Độ rộng tối ưu cho màn hình điện thoại */
            margin: 0 auto;
            background: #1e1e24; /* Nền container tạo khối chiều sâu */
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin: 8px 0 20px 0;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 📱 THANH TIÊU ĐỀ BẤM ĐỂ ĐÓNG/MỞ (ACCORDION HEADER) */
        .accordion-header {
            background-color: #262631;
            color: #3498db;
            padding: 14px 16px;
            margin-top: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            border-left: 4px solid #3498db;
            transition: background-color 0.2s;
        }
        /* Đổi màu sắc thanh bấm cho từng nhóm để dễ phân biệt */
        .header-chinh {
            color: #1abc9c;
            border-left-color: #1abc9c;
        }
        .header-phan-nhom {
            color: #9b59b6;
            border-left-color: #9b59b6;
        }
        .header-tro-giang {
            color: #e67e22;
            border-left-color: #e67e22;
        }
        
        /* Hiệu ứng mũi tên xoay khi đóng/mở */
        .accordion-icon {
            transition: transform 0.2s ease;
            font-size: 0.8em;
        }
        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }
        .accordion-header:active {
            background-color: #2d2d3a;
        }

        /* KHỐI NỘI DUNG ẨN MẶC ĐỊNH */
        .accordion-content {
            display: none;
            margin-top: 10px;
            margin-bottom: 14px;
        }
        /* Class kích hoạt hiển thị */
        .accordion-content.open {
            display: block;
        }

        /* 📱 THIẾT KẾ THẺ DANH SÁCH (MOBILE CARDS) */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .user-card {
            background: #262631;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-left: 3px solid #555566;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .user-name {
            font-size: 1.05em;
            font-weight: bold;
            color: #ffffff;
        }
        .badge-lop {
            background-color: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .header-tro-giang + .accordion-content .badge-lop {
            background-color: #e67e22;
        }
        .user-time {
            font-size: 0.82em;
            color: #94a3b8;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        /* KHU VỰC NÚT ĐIỀU HƯỚNG LIÊN HỆ */
        .contact-actions {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: white;
            padding: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85em;
            text-align: center;
            transition: opacity 0.2s;
        }
        .btn-phone {
            background-color: #1ba3b5;
        }
        .btn-zalo {
            background-color: #0068ff;
        }
        .btn-action:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản Lý Nhân Sự</h2>
    
    <!-- THANH BẤM 1: GIÁO VIÊN CHÍNH -->
    <div class="accordion-header header-chinh" onclick="toggleAccordion('gv-chinh-content', this)">
        <span>⭐ GIÁO VIÊN CHÍNH</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="gv-chinh-content" class="accordion-content">
        <div id="gv-chinh-cards" class="card-list"></div>
    </div>

    <!-- THANH BẤM 2: PHÂN NHÓM -->
    <div class="accordion-header header-phan-nhom" onclick="toggleAccordion('gv-phan-nhom-content', this)">
        <span>👥 GIÁO VIÊN PHÂN NHÓM</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="gv-phan-nhom-content" class="accordion-content">
        <div id="gv-phan-nhom-cards" class="card-list"></div>
    </div>

    <!-- THANH BẤM 3: TRỢ GIẢNG -->
    <div class="accordion-header header-tro-giang" onclick="toggleAccordion('tro-giang-content', this)">
        <span>🧑‍🎓 DANH SÁCH TRỢ GIẢNG</span>
        <span class="accordion-icon">▼</span>
    </div>
    <div id="tro-giang-content" class="accordion-content">
        <div id="tro-giang-cards" class="card-list"></div>
    </div>
</div>

<script>
    // 1. DỮ LIỆU GIÁO VIÊN CHÍNH
    const danhSachGvChinh = [
        { hoTen: "Anh Thư", sdt: "0901234567", lop: "Lớp 10A1", thoiGian: "Thứ 2, Thứ 4 (08:00 - 10:00)" },
        { hoTen: "Phương Thanh", sdt: "0912345678", lop: "Lớp 11B2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Quỳnh Anh", sdt: "0912345678", lop: "Lớp 11B2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Thanh Mai", sdt: "0912345678", lop: "Lớp 11B2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Hưng", sdt: "0983456789", lop: "Lớp 12C3", thoiGian: "Thứ 7 (09:00 - 11:30)" }
    ];

    // 2. DỮ LIỆU GIÁO VIÊN PHÂN NHÓM
    const danhSachGvPhanNhom = [
        { hoTen: "Hà Linh", sdt: "0912345678", lop: "Phân Nhóm 1", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Diệp Anh", sdt: "0912345678", lop: "Phân Nhóm 2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Mạnh Toàn", sdt: "0912345678", lop: "Phân Nhóm 1", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Thu Minh", sdt: "0912345678", lop: "Phân Nhóm 3", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Hà My", sdt: "0912345678", lop: "Phân Nhóm 2", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Duyên", sdt: "0912345678", lop: "Phân Nhóm 1", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" },
        { hoTen: "Bảo Anh", sdt: "0912345678", lop: "Phân Nhóm 3", thoiGian: "Thứ 3, Thứ 5 (14:00 - 16:00)" }
    ];

    // 3. DỮ LIỆU TRỢ GIẢNG
    const danhSachTroGiang = [
        { hoTen: "Phạm Minh D", sdt: "0977888999", lop: "Lớp 10A1 & 11B2", thoiGian: "Thứ 2, 3, 4, 5 (Theo ca học)" },
        { hoTen: "Hoàng Thu Thảo", sdt: "0965123456", lop: "Lớp 12C3", thoiGian: "Thứ 7 (08:30 - 12:00)" },
        { hoTen: "Đặng Đình Khôi", sdt: "0934555666", lop: "Lớp Luyện Thi", thoiGian: "Chủ Nhật (17:30 - 20:30)" }
    ];

    function getRawPhone(phoneStr) {
        return phoneStr.replace(/[^0-9]/g, "");
    }

    function formatPhoneDisplay(phoneStr) {
        if (!phoneStr) return "";
        return phoneStr.replace(/(\d{4})(\d{3})(\d{3})/, "$1.$2.$3");
    }

    // Đổ dữ liệu ra Card List
    function renderCardList(dataArray, targetContainerId) {
        const container = document.getElementById(targetContainerId);
        container.innerHTML = ""; 

        dataArray.forEach(item => {
            const rawPhone = getRawPhone(item.sdt);
            const displayPhone = formatPhoneDisplay(item.sdt);
            
            const card = document.createElement("div");
            card.className = "user-card";
            card.innerHTML = `
                <div class="card-header">
                    <div class="user-name">${item.hoTen}</div>
                    <div class="badge-lop">${item.lop}</div>
                </div>
                <div class="user-time">🕒 Lịch: ${item.thoiGian}</div>
                <div class="contact-actions">
                    <a href="tel:${rawPhone}" class="btn-action btn-phone">📞 Gọi: ${displayPhone}</a>
                    <a href="https://zalo.me/${rawPhone}" target="_blank" class="btn-action btn-zalo">💬 Zalo</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 🛠️ LOGIC ĐÓNG / MỞ KHỐI THÔNG MINH (TOGGLE ACCORDION)
    function toggleAccordion(contentId, headerElement) {
        const content = document.getElementById(contentId);
        
        // Kiểm tra xem tab này hiện tại đang mở không
        const isOpen = content.classList.contains('open');
        
        // Thêm hoặc xóa class tùy thuộc vào trạng thái bấm (Bấm lần 1 mở, lần 2 đóng)
        if (isOpen) {
            content.classList.remove('open');
            headerElement.classList.remove('active');
        } else {
            content.classList.add('open');
            headerElement.classList.add('active');
        }
    }

    window.onload = function() {
        renderCardList(danhSachGvChinh, "gv-chinh-cards");
        renderCardList(danhSachGvPhanNhom, "gv-phan-nhom-cards");
        renderCardList(danhSachTroGiang, "tro-giang-cards");
    };
</script>

</body>
</html>
